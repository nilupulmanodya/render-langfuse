services:
  # -------------------------------------------------------
  # 1. MinIO (Official Image - Fixed Command)
  # -------------------------------------------------------
  - type: pserv
    name: minio
    runtime: image
    image: 
      # PINNED: Stable 2024 Release
      url: minio/minio:RELEASE.2024-11-07T00-52-20Z
    region: oregon
    plan: starter
    # FIX: Removed "minio" from the start.
    # The image automatically adds 'minio', so we just provide the arguments.
    startCommand: "server /data --console-address :9001"
    envVars:
      - key: MINIO_ROOT_USER
        value: minio
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
      - key: PORT
        value: "9000"
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10

  # -------------------------------------------------------
  # 2. ClickHouse (Working)
  # -------------------------------------------------------
  - type: pserv
    name: clickhouse
    runtime: image
    image:
      url: clickhouse/clickhouse-server:24.3
    region: oregon
    plan: standard
    startCommand: "/usr/bin/clickhouse-server --config-file=/etc/clickhouse-server/config.xml"
    envVars:
      - key: CLICKHOUSE_DB
        value: default
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        value: langfuse_secure_password
      - key: PORT
        value: "8123"
    disk:
      name: clickhouse-data
      mountPath: /var/lib/clickhouse
      sizeGB: 10

  # -------------------------------------------------------
  # 3. Langfuse Worker
  # -------------------------------------------------------
  - type: worker
    name: langfuse-worker
    runtime: image
    image:
      url: langfuse/langfuse-worker:3
    region: oregon
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: langfuse-postgres
          property: connectionString
      - key: REDIS_CONNECTION_STRING
        fromService:
          type: redis
          name: langfuse-redis
          property: connectionString
      - key: CLICKHOUSE_URL
        value: http://clickhouse:8123
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        value: langfuse_secure_password
      - key: CLICKHOUSE_MIGRATION_URL
        value: clickhouse://default:langfuse_secure_password@clickhouse:9000
      - key: CLICKHOUSE_CLUSTER_ENABLED
        value: "false"
      - key: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
        value: langfuse
      - key: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
        value: http://minio:9000
      - key: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
        value: minio
      - key: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
        fromService:
          type: pserv
          name: minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
        value: "true"
      - key: LANGFUSE_S3_EVENT_UPLOAD_REGION
        value: us-east-1
      - key: SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        value: "a6d2c49641776993510255345700249286701550917639103957242137525310"

  # -------------------------------------------------------
  # 4. Langfuse Web
  # -------------------------------------------------------
  - type: web
    name: langfuse-web
    runtime: image
    image:
      url: langfuse/langfuse:3
    region: oregon
    plan: standard 
    healthCheckPath: /api/public/health
    envVars:
      - key: NEXTAUTH_URL
        value: https://langfuse-web.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: langfuse-postgres
          property: connectionString
      - key: REDIS_CONNECTION_STRING
        fromService:
          type: redis
          name: langfuse-redis
          property: connectionString
      - key: CLICKHOUSE_URL
        value: http://clickhouse:8123
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        value: langfuse_secure_password
      - key: CLICKHOUSE_MIGRATION_URL
        value: clickhouse://default:langfuse_secure_password@clickhouse:9000
      - key: CLICKHOUSE_CLUSTER_ENABLED
        value: "false"
      - key: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
        value: langfuse
      - key: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
        value: http://minio:9000
      - key: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
        value: minio
      - key: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
        fromService:
          type: pserv
          name: minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
        value: "true"
      - key: LANGFUSE_S3_EVENT_UPLOAD_REGION
        value: us-east-1
      - key: SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        value: "a6d2c49641776993510255345700249286701550917639103957242137525310"

  # -------------------------------------------------------
  # 5. LiteLLM Proxy
  # -------------------------------------------------------
  - type: web
    name: synthifai-proxy
    runtime: image
    image:
      url: ghcr.io/berriai/litellm:main-v1.80.12-nightly
    envVars:
      - key: PORT
        value: 4000
      - key: LITELLM_CALLBACKS
        value: '["langfuse_otel"]'
      - key: LANGFUSE_OTEL_HOST
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LITELLM_MASTER_KEY
        sync: false
    numInstances: 1
    healthCheckPath: /health/liveliness
    autoDeploy: true

  # -------------------------------------------------------
  # 6. Redis
  # -------------------------------------------------------
  - type: redis
    name: langfuse-redis
    region: oregon
    plan: starter
    ipAllowList: [] 

databases:
  - name: langfuse-postgres
    region: oregon
    plan: basic-256mb
    databaseName: langfuse
    user: langfuse
