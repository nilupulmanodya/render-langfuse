services:
  # -------------------------------------------------------
  # 1. MinIO (S3 Storage) - Starts First
  # -------------------------------------------------------
  - type: pserv
    name: minio
    runtime: image
    image: 
      url: public.ecr.aws/bitnami/minio:latest
    region: oregon
    plan: starter
    # SAFETY CONFIG:
    # 1. We force PORT to 9000 so it never randomizes to 10000.
    # 2. We use MINIO_DEFAULT_BUCKETS to auto-create the 'langfuse' bucket.
    envVars:
      - key: MINIO_ROOT_USER
        value: minio
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
      - key: MINIO_DEFAULT_BUCKETS
        value: "langfuse"
      - key: MINIO_DATA_DIR
        value: "/data"
      - key: PORT  # <--- FORCE STABLE PORT
        value: "9000"
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10

  # -------------------------------------------------------
  # 2. ClickHouse (Analytics DB)
  # -------------------------------------------------------
  - type: pserv
    name: clickhouse
    runtime: image
    image:
      url: clickhouse/clickhouse-server:latest
    region: oregon
    plan: standard
    # SAFETY CONFIG:
    # ClickHouse uses 8123 (HTTP) and 9000 (TCP). 
    # We force the primary PORT to 8123 so Render checks health there.
    envVars:
      - key: CLICKHOUSE_DB
        value: default
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        value: langfuse_secure_password
      - key: PORT # <--- FORCE STABLE PORT
        value: "8123"
    disk:
      name: clickhouse-data
      mountPath: /var/lib/clickhouse
      sizeGB: 10

  # -------------------------------------------------------
  # 3. Langfuse Worker (Background Jobs)
  # -------------------------------------------------------
  - type: worker
    name: langfuse-worker
    runtime: image
    image:
      url: langfuse/langfuse-worker:3
    region: oregon
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: langfuse-postgres
          property: connectionString
      - key: REDIS_CONNECTION_STRING
        fromService:
          type: redis
          name: langfuse-redis
          property: connectionString
      # STABLE HOSTNAMES:
      # Because we named the services 'clickhouse' and 'minio' above,
      # and forced the ports, these URLs are now guaranteed to work.
      - key: CLICKHOUSE_URL
        value: http://clickhouse:8123
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        value: langfuse_secure_password
      - key: CLICKHOUSE_MIGRATION_URL
        value: clickhouse://default:langfuse_secure_password@clickhouse:9000
      - key: CLICKHOUSE_CLUSTER_ENABLED
        value: "false"
      - key: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
        value: langfuse
      - key: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
        value: http://minio:9000
      - key: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
        value: minio
      - key: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
        fromService:
          type: pserv
          name: minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
        value: "true"
      - key: LANGFUSE_S3_EVENT_UPLOAD_REGION
        value: us-east-1
      - key: SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

  # -------------------------------------------------------
  # 4. Langfuse Web (UI)
  # -------------------------------------------------------
  - type: web
    name: langfuse-web
    runtime: image
    image:
      url: langfuse/langfuse:3
    region: oregon
    plan: standard 
    healthCheckPath: /api/public/health
    envVars:
      - key: NEXTAUTH_URL
        value: https://langfuse-web.onrender.com
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: langfuse-postgres
          property: connectionString
      - key: REDIS_CONNECTION_STRING
        fromService:
          type: redis
          name: langfuse-redis
          property: connectionString
      - key: CLICKHOUSE_URL
        value: http://clickhouse:8123
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        value: langfuse_secure_password
      - key: CLICKHOUSE_MIGRATION_URL
        value: clickhouse://default:langfuse_secure_password@clickhouse:9000
      - key: CLICKHOUSE_CLUSTER_ENABLED
        value: "false"
      - key: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
        value: langfuse
      - key: LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT
        value: http://minio:9000
      - key: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
        value: minio
      - key: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
        fromService:
          type: pserv
          name: minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
        value: "true"
      - key: LANGFUSE_S3_EVENT_UPLOAD_REGION
        value: us-east-1
      - key: SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

  # -------------------------------------------------------
  # 5. LiteLLM Proxy (OTEL Integration)
  # -------------------------------------------------------
  - type: web
    name: synthifai-proxy
    runtime: image
    image:
      url: ghcr.io/berriai/litellm:main-stable
    numInstances: 1
    healthCheckPath: /health/liveliness
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4000
      
      # ENABLE OTEL TRACING (JSON FORMAT REQUIRED)
      - key: LITELLM_CALLBACKS
        value: '["langfuse_otel"]'

      # --- SECRETS (You MUST add these in Dashboard later) ---
      
      # URL Example: https://langfuse-web-xxxx.onrender.com/api/public/otel
      - key: LANGFUSE_OTEL_HOST
        sync: false

      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
        
      # Master Key for Security
      - key: LITELLM_MASTER_KEY
        sync: false

  # -------------------------------------------------------
  # 6. Redis
  # -------------------------------------------------------
  - type: redis
    name: langfuse-redis
    region: oregon
    plan: starter
    ipAllowList: [] 

# -------------------------------------------------------
# Databases
# -------------------------------------------------------
databases:
  - name: langfuse-postgres
    region: oregon
    plan: basic-256mb
    databaseName: langfuse
    user: langfuse
