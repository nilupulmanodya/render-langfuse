services:
  # -------------------------------------------------------
  # 1. MinIO (S3 Storage)
  # -------------------------------------------------------
  - type: pserv
    name: minio
    runtime: image
    image: 
      url: public.ecr.aws/bitnami/minio:2025.10.15
    region: oregon
    plan: starter
    startCommand: minio server /data --console-address :9001
    envVars:
      - key: MINIO_ROOT_USER
        value: minio
      - key: MINIO_ROOT_PASSWORD
        generateValue: true
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 10

  # -------------------------------------------------------
  # 2. ClickHouse (Analytics DB)
  # -------------------------------------------------------
  - type: pserv
    name: clickhouse
    runtime: image
    image:
      url: clickhouse/clickhouse-server:24.3.2
    region: oregon
    plan: standard
    envVars:
      # FIX: Removed USER/DB vars to prevent "Operation not permitted" crash.
      # The image defaults to user="default" automatically.
      - key: CLICKHOUSE_PASSWORD
        generateValue: true
    disk:
      name: clickhouse-data
      mountPath: /var/lib/clickhouse
      sizeGB: 10

  # -------------------------------------------------------
  # 3. Langfuse Worker
  # -------------------------------------------------------
  - type: worker
    name: langfuse-worker
    runtime: image
    image:
      url: langfuse/langfuse-worker:3.122.0
    region: oregon
    plan: starter
    # STARTUP SCRIPT: Waits for DBs to be reachable
    startCommand: >
      /bin/sh -c '
      echo "--- Checking Dependencies ---";
      
      echo "Waiting for Postgres at $DB_HOST...";
      until node -e "require('net').createConnection(5432, process.env.DB_HOST).on('connect', ()=>process.exit(0)).on('error', ()=>process.exit(1))"; do sleep 2; done;
      
      echo "Waiting for Clickhouse at $CH_HOST...";
      until node -e "require('net').createConnection(8123, process.env.CH_HOST).on('connect', ()=>process.exit(0)).on('error', ()=>process.exit(1))"; do sleep 2; done;
      
      echo "--- Dependencies UP ---";
      
      # Construct URLs dynamically
      export CLICKHOUSE_URL="http://${CH_HOST}:8123"
      export CLICKHOUSE_MIGRATION_URL="clickhouse://default:${CH_PASS}@${CH_HOST}:9000"
      export LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT="http://${MINIO_HOST}:9000"
      
      node dist/worker.js'
    envVars:
      # --- Raw Connection Vars (Used in startCommand) ---
      - key: DB_HOST
        fromDatabase: {name: langfuse-postgres, property: host}
      - key: CH_HOST
        fromService: {type: pserv, name: clickhouse, property: host}
      - key: CH_PASS
        fromService: {type: pserv, name: clickhouse, envVarKey: CLICKHOUSE_PASSWORD}
      - key: MINIO_HOST
        fromService: {type: pserv, name: minio, property: host}
      
      # --- Langfuse Config ---
      - key: DATABASE_URL
        fromDatabase:
          name: langfuse-postgres
          property: connectionString
      - key: REDIS_CONNECTION_STRING
        fromService:
          type: redis
          name: langfuse-redis
          property: connectionString
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD 
        fromService: {type: pserv, name: clickhouse, envVarKey: CLICKHOUSE_PASSWORD}
      - key: CLICKHOUSE_CLUSTER_ENABLED
        value: "false"
      - key: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
        value: langfuse
      - key: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
        value: minio
      - key: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
        fromService:
          type: pserv
          name: minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
        value: "true"
      - key: LANGFUSE_S3_EVENT_UPLOAD_REGION
        value: us-east-1
      - key: SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        value: "e4bad55e8d530635489020968630737307041490216694600494002621062002"

  # -------------------------------------------------------
  # 4. Langfuse Web (UI)
  # -------------------------------------------------------
  - type: web
    name: langfuse-web
    runtime: image
    image:
      url: langfuse/langfuse:3.122.0
    region: oregon
    plan: standard
    healthCheckPath: /api/public/health
    # STARTUP SCRIPT: Waits for DBs to be reachable
    startCommand: >
      /bin/sh -c '
      echo "--- Checking Dependencies ---";
      
      echo "Waiting for Postgres at $DB_HOST...";
      until node -e "require('net').createConnection(5432, process.env.DB_HOST).on('connect', ()=>process.exit(0)).on('error', ()=>process.exit(1))"; do sleep 2; done;
      
      echo "Waiting for Clickhouse at $CH_HOST...";
      until node -e "require('net').createConnection(8123, process.env.CH_HOST).on('connect', ()=>process.exit(0)).on('error', ()=>process.exit(1))"; do sleep 2; done;
      
      echo "--- Dependencies UP ---";
      
      # Construct URLs dynamically
      export CLICKHOUSE_URL="http://${CH_HOST}:8123"
      export CLICKHOUSE_MIGRATION_URL="clickhouse://default:${CH_PASS}@${CH_HOST}:9000"
      export LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT="http://${MINIO_HOST}:9000"
      
      npm run start'
    envVars:
      # --- Raw Connection Vars ---
      - key: DB_HOST
        fromDatabase: {name: langfuse-postgres, property: host}
      - key: CH_HOST
        fromService: {type: pserv, name: clickhouse, property: host}
      - key: CH_PASS
        fromService: {type: pserv, name: clickhouse, envVarKey: CLICKHOUSE_PASSWORD}
      - key: MINIO_HOST
        fromService: {type: pserv, name: minio, property: host}

      # --- Web Specific Config ---
      - key: NEXTAUTH_URL
        value: https://langfuse-web.onrender.com 
      - key: NEXTAUTH_SECRET
        generateValue: true
      
      # --- Shared Config ---
      - key: DATABASE_URL
        fromDatabase:
          name: langfuse-postgres
          property: connectionString
      - key: REDIS_CONNECTION_STRING
        fromService:
          type: redis
          name: langfuse-redis
          property: connectionString
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        fromService: {type: pserv, name: clickhouse, envVarKey: CLICKHOUSE_PASSWORD}
      - key: CLICKHOUSE_CLUSTER_ENABLED
        value: "false"
      - key: LANGFUSE_S3_EVENT_UPLOAD_BUCKET
        value: langfuse
      - key: LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID
        value: minio
      - key: LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY
        fromService:
          type: pserv
          name: minio
          envVarKey: MINIO_ROOT_PASSWORD
      - key: LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE
        value: "true"
      - key: LANGFUSE_S3_EVENT_UPLOAD_REGION
        value: us-east-1
      - key: SALT
        generateValue: true
      - key: ENCRYPTION_KEY
        value: "e4bad55e8d530635489020968630737307041490216694600494002621062002"

  # -------------------------------------------------------
  # 5. Redis
  # -------------------------------------------------------
  - type: redis
    name: langfuse-redis
    region: oregon
    plan: starter
    ipAllowList: [] 

databases:
  - name: langfuse-postgres
    region: oregon
    plan: basic-256mb
    databaseName: langfuse
    user: langfuse
